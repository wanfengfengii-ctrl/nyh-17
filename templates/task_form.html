{% extends "base.html" %}

{% block title %}{% if task %}编辑任务{% else %}新建任务{% endif %} - 陶片修复协同与审批管理系统{% endblock %}

{% block body %}
<div class="container-fluid">
    <div class="row">
        {% include "sidebar.html" %}
        
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-4 pb-3 mb-4 border-bottom">
                <h1 class="h2">
                    <i class="bi bi-clipboard-plus text-primary me-2"></i>{% if task %}编辑任务{% else %}新建修复任务{% endif %}
                </h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <a href="/tasks" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-1"></i>返回列表
                    </a>
                </div>
            </div>
            
            {% if error %}
            <div class="alert alert-danger alert-dismissible fade show mb-4" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endif %}
            
            <div class="card shadow-sm">
                <div class="card-body">
                    <form method="POST" class="row g-3">
                        <div class="col-md-6">
                            <label for="pottery_id" class="form-label">选择陶片 <span class="text-danger">*</span></label>
                            <select class="form-select" id="pottery_id" name="pottery_id" required {% if task %}disabled{% endif %}>
                                <option value="">请选择陶片</option>
                                {% for p in potteries %}
                                <option value="{{ p.id }}" {% if task and task.pottery_id == p.id %}selected{% endif %}>
                                    {{ p.pottery_number }} - {{ p.material }} ({{ p.damage_level }})
                                </option>
                                {% endfor %}
                            </select>
                            {% if task %}
                            <input type="hidden" name="pottery_id" value="{{ task.pottery_id }}">
                            {% endif %}
                        </div>
                        <div class="col-md-6">
                            <label for="title" class="form-label">任务标题 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="title" name="title" required
                                   value="{{ task.title if task else '' }}" placeholder="请输入任务标题">
                        </div>
                        
                        <div class="col-md-4">
                            <label for="priority" class="form-label">优先级</label>
                            <select class="form-select" id="priority" name="priority">
                                <option value="低" {% if task and task.priority == '低' %}selected{% endif %}>低</option>
                                <option value="普通" {% if not task or task.priority == '普通' %}selected{% endif %}>普通</option>
                                <option value="高" {% if task and task.priority == '高' %}selected{% endif %}>高</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="assignee_id" class="form-label">分派给</label>
                            <select class="form-select" id="assignee_id" name="assignee_id">
                                <option value="">请选择修复人员</option>
                                {% for u in users %}
                                <option value="{{ u.id }}" {% if task and task.assignee_id == u.id %}selected{% endif %}>
                                    {{ u.full_name or u.username }} ({{ u.role }})
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="due_date" class="form-label">截止日期</label>
                            <input type="date" class="form-control" id="due_date" name="due_date" min="{{ today }}"
                                   value="{{ task.due_date|strftime if task and task.due_date else '' }}">
                        </div>
                        
                        <div class="col-12">
                            <label for="description" class="form-label">任务描述</label>
                            <textarea class="form-control" id="description" name="description" rows="4"
                                      placeholder="请详细描述修复任务要求...">{{ task.description if task else '' }}</textarea>
                        </div>
                        
                        <div class="col-12 pt-4 border-top">
                            <button type="submit" class="btn btn-primary me-2">
                                <i class="bi bi-save me-1"></i>保存
                            </button>
                            <a href="/tasks" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg me-1"></i>取消
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>
{% endblock %}
