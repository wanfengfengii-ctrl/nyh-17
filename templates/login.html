{% extends "base.html" %}

{% block title %}登录 - 陶片修复协同与审批管理系统{% endblock %}

{% block body %}
<div class="container-fluid vh-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 50%, #3d7ab5 100%);">
    <div class="card shadow-lg" style="width: 100%; max-width: 420px; border-radius: 16px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <i class="bi bi-water text-primary" style="font-size: 3rem;"></i>
                <h3 class="mt-3 mb-1">陶片修复协同与审批管理系统</h3>
                <p class="text-muted">请登录以继续</p>
            </div>
            
            {% if error %}
            <div class="alert alert-danger" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error }}
            </div>
            {% endif %}
            
            <form method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label">用户名</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="username" name="username" required autofocus>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">密码</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">
                    <i class="bi bi-box-arrow-in-right me-2"></i>登录
                </button>
            </form>
            
            <div class="mt-4 text-center text-muted small">
                <p class="mb-0">默认账号: admin / admin123</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
